name: Mart daily scrape

on:
  schedule:
    # 5:00 AM Pakistan time (UTC+5) == 00:00 UTC
    - cron: '0 0 * * *'
  # Manual run from the Actions tab -- useful for testing and re-runs.
  workflow_dispatch:

# Only one scrape at a time -- if a long run overlaps the next schedule
# we just skip the newer one rather than racing two browsers.
concurrency:
  group: mart-scrape
  cancel-in-progress: false

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write  # needed so we can git push the new JSON back

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python deps
        run: |
          python -m pip install --upgrade pip
          pip install playwright==1.45.0 playwright-stealth==1.0.6

      - name: Install Chromium for Playwright
        run: python -m playwright install --with-deps chromium

      - name: Run scraper
        env:
          MART_EMAIL:    ${{ secrets.MART_EMAIL }}
          MART_PASSWORD: ${{ secrets.MART_PASSWORD }}
          MART_HOST:     ${{ secrets.MART_HOST }}
          MART_COOKIES:  ${{ secrets.MART_COOKIES }}
          MART_PROXY:    ${{ secrets.MART_PROXY }}
        run: python Scraper/Scraper.py

      - name: Upload debug snapshot on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: scraper-debug
          path: Scraper/debug/
          if-no-files-found: ignore

      - name: Commit & push new data file
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Scraper/data/
          if git diff --cached --quiet; then
            echo "No new data to commit."
          else
            git commit -m "data: scrape $(TZ=Asia/Karachi date +%F) [skip ci]"
            git push
          fi
