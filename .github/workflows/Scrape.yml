```yaml id="kklz3j"
name: Mart daily scrape

on:
  schedule:
    # 5:00 AM Pakistan time (UTC+5)
    - cron: '0 0 * * *'

  workflow_dispatch:

concurrency:
  group: mart-scrape
  cancel-in-progress: false

jobs:
  scrape:
    runs-on: ubuntu-latest

    timeout-minutes: 25

    permissions:
      contents: write

    steps:

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Show runner network info
        run: |
          echo "========== PUBLIC IP =========="
          curl -s --max-time 20 https://api.ipify.org || true
          echo

          echo "========== IP INFO =========="
          curl -s --max-time 20 https://ipinfo.io || true
          echo

          echo "========== DNS TEST =========="
          nslookup sellercenter.daraz.pk || true
          echo

      - name: Upgrade pip
        run: |
          python -m pip install --upgrade pip

      - name: Install Python dependencies
        run: |
          pip install requests
          pip install patchright>=1.49.0
          pip install playwright-stealth==1.0.6

      - name: Install Chromium
        run: |
          python -m patchright install chromium

      - name: Verify installations
        run: |
          python -c "import requests; print('requests OK')"
          python -c "import patchright; print('patchright OK')"
          python -c "import playwright_stealth; print('stealth OK')"

      - name: Create required folders
        run: |
          mkdir -p Scraper/debug
          mkdir -p Scraper/data

      - name: Run scraper
        env:
          MART_EMAIL: ${{ secrets.MART_EMAIL }}
          MART_PASSWORD: ${{ secrets.MART_PASSWORD }}
          MART_HOST: ${{ secrets.MART_HOST }}
          MART_COOKIES: ${{ secrets.MART_COOKIES }}
          MART_PROXY: ${{ secrets.MART_PROXY }}

        run: |
          python Scraper/Scraper.py

      - name: Upload debug artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: scraper-debug
          path: |
            Scraper/debug/
            Scraper/data/
          if-no-files-found: ignore
          retention-days: 7

      - name: Commit scraped data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add Scraper/data/

          if git diff --cached --quiet; then
            echo "No changes detected."
          else
            git commit -m "data: scrape $(TZ=Asia/Karachi date +%F) [skip ci]"
            git push
          fi
```
